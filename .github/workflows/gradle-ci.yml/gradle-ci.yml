name: Java Gradle CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Setup Java Development Kit (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle Environment
      uses: gradle/actions/setup-gradle@v3

    - name: Compile and Execute Unit Tests
      run: |
        cd app
        gradle test

    - name: Assemble Production Build Jar
      run: |
        cd app
        gradle build -x test
